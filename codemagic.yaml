# Codemagic CI/CD configuration for Didi Mobile
# Place this file in the root of your repository

workflows:
  ios-release:
    name: Didi iOS Release (App Store)
    max_build_duration: 60
    instance_type: mac_mini_m2 # Runs on Apple Silicon Macs in the cloud
    environment:
      node: 22.11.0 # Matches your project's Node 22 engine
      xcode: latest # Use latest stable Xcode — confirmed working for prior TestFlight uploads
      cocoapods: default
      groups:
        # Define these variables in your Codemagic application settings:
        # - APP_STORE_CONNECT_PRIVATE_KEY (App Store Connect API key contents)
        # - APP_STORE_CONNECT_KEY_IDENTIFIER (API Key ID)
        # - APP_STORE_CONNECT_ISSUER_ID (Issuer ID)
        # - CERTIFICATE_PRIVATE_KEY (For iOS signing certificate)
        - app_store_credentials
      vars:
        XCODE_WORKSPACE: "apps/mobile/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.ghdidi.app"
    # Build ONLY on a pushed git tag matching build-* — NOT on every push.
    # Auto-building each commit floods TestFlight uploads → Apple upload limit
    # (altool 90382). Tag-triggering gives intentional, on-demand builds:
    #   git tag build-1 && git push origin build-1
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'build-*'
          include: true
    scripts:
      - name: Install Monorepo Dependencies
        script: |
          npm ci
      - name: Write mobile build env (.env.local)
        script: |
          # Inline public client keys so the Capacitor bundle has working
          # Supabase URLs. These are safe to commit — the anon key is
          # RLS-protected and already ships in the web bundle.
          cat > apps/mobile/.env.local <<EOF
          NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-https://ghdidi.com}
          NEXT_PUBLIC_URL=${NEXT_PUBLIC_URL:-https://ghdidi.com}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://qldpbkfaouvtsbvwtqji.supabase.co}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZHBia2Zhb3V2dHNidnd0cWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODIwOTgsImV4cCI6MjA5NTU1ODA5OH0.xK2OGn7TK1Z5iGbs_oFjbs2Vm7A8eBKLIKkns2SzIMI}
          EOF
          echo "Wrote apps/mobile/.env.local"
      - name: Build Next.js Static Export
        script: |
          set -e
          # Compiles the web app to apps/mobile/out
          npm run mobile:export
          test -s apps/mobile/out/index.html || { echo "ERROR: index.html missing after export"; exit 1; }
          echo "Export OK — $(find apps/mobile/out -type f | wc -l) files"
      - name: Install iOS Native Shell Dependencies
        script: |
          set -e
          # Copy static files to ios folder and run pod install
          cd apps/mobile
          npx cap sync ios
          PUB=ios/App/App/public
          test -s "$PUB/index.html" || { echo "ERROR: $PUB/index.html missing after cap sync"; exit 1; }
          echo "cap sync OK — $PUB has $(find "$PUB" -type f | wc -l) files"
          # Do NOT hand-write capacitor.config.json here. `cap sync` already
          # generates it from capacitor.config.ts AND auto-fills packageClassList
          # (the list of native plugins to register on iOS). A hand-written config
          # dropped packageClassList, so every plugin — Preferences, Push, Geo —
          # became "not implemented on ios" at runtime (setSession crashed because
          # the Supabase session storage uses the Preferences plugin). Verify the
          # generated config kept the plugin registrations instead.
          CFG=ios/App/App/capacitor.config.json
          grep -q "PreferencesPlugin" "$CFG" || { echo "ERROR: PreferencesPlugin missing from $CFG"; cat "$CFG"; exit 1; }
          echo "capacitor.config.json OK — packageClassList present"
      - name: Write GoogleService-Info.plist
        script: |
          printf '%s' "$GOOGLE_SERVICE_INFO_PLIST" > apps/mobile/ios/App/App/GoogleService-Info.plist
          echo "GoogleService-Info.plist written ($(wc -c < apps/mobile/ios/App/App/GoogleService-Info.plist) bytes)"
      - name: Set up code signing
        script: |
          set -e # Exit immediately if any command fails
          keychain initialize
          # Fetch App Store provisioning profiles and signing certificates
          app-store-connect fetch-signing-files "$BUNDLE_ID" --platform IOS --type IOS_APP_STORE --create
          # Widget extension needs its own bundle id + provisioning profile
          app-store-connect fetch-signing-files "$BUNDLE_ID.DidiWidgets" --platform IOS --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles --project apps/mobile/ios/App/App.xcodeproj
      - name: Set build number (timestamp — collision-proof)
        script: |
          set -e
          # Apple CONSUMES a build number even when an upload fails validation,
          # so any "latest TestFlight/App Store + 1" scheme eventually collides
          # ("the provided entity includes an attribute with a value that has
          # already been used"). A Unix-epoch timestamp is strictly monotonic and
          # unique across every run, and fits CFBundleVersion's uint32 limit
          # (epoch ~1.7e9 < 4.29e9). No API query needed.
          NEXT=$(date +%s)
          echo "Using build number $NEXT"
          PBX=apps/mobile/ios/App/App.xcodeproj/project.pbxproj
          sed -i.bak -E "s/CURRENT_PROJECT_VERSION = [0-9]+;/CURRENT_PROJECT_VERSION = $NEXT;/g" "$PBX"
          rm -f "$PBX.bak"
          echo "CURRENT_PROJECT_VERSION set to $NEXT"
      - name: Build iOS IPA (.ipa)
        script: |
          # Compiles the signed App ready for App Store upload
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - ebenezer.barning@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-release:
    name: Didi Android Release (Play Store)
    max_build_duration: 60
    instance_type: linux_x2
    environment:
      node: 22.11.0
      java: 17 # AGP 8.2 requires JDK 17
      groups:
        # Define these variables in Codemagic app settings (group: android_credentials):
        # - GOOGLE_SERVICES_JSON       (contents of Firebase google-services.json for com.ghdidi.app)
        # - ANDROID_KEYSTORE_BASE64    (base64 of the upload keystore .jks)
        # - ANDROID_KEYSTORE_PASSWORD
        # - ANDROID_KEY_ALIAS
        # - ANDROID_KEY_PASSWORD
        # Until they exist the build still succeeds: debug-signed (sideload-only)
        # and, without GOOGLE_SERVICES_JSON, with push notifications disabled.
        - android_credentials
    # Tag-triggered like iOS, with a distinct prefix so platforms release
    # independently:  git tag android-1 && git push origin android-1
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'android-*'
          include: true
    scripts:
      - name: Install Monorepo Dependencies
        script: |
          npm ci
      - name: Write mobile build env (.env.local)
        script: |
          # Inline public client keys so the Capacitor bundle has working
          # Supabase URLs. These are safe to commit — the anon key is
          # RLS-protected and already ships in the web bundle.
          cat > apps/mobile/.env.local <<EOF
          NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-https://ghdidi.com}
          NEXT_PUBLIC_URL=${NEXT_PUBLIC_URL:-https://ghdidi.com}
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:-https://qldpbkfaouvtsbvwtqji.supabase.co}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFsZHBia2Zhb3V2dHNidnd0cWppIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODIwOTgsImV4cCI6MjA5NTU1ODA5OH0.xK2OGn7TK1Z5iGbs_oFjbs2Vm7A8eBKLIKkns2SzIMI}
          EOF
          echo "Wrote apps/mobile/.env.local"
      - name: Build Next.js Static Export
        script: |
          set -e
          # Compiles the web app to apps/mobile/out
          npm run mobile:export
          test -s apps/mobile/out/index.html || { echo "ERROR: index.html missing after export"; exit 1; }
          echo "Export OK — $(find apps/mobile/out -type f | wc -l) files"
      - name: Sync Capacitor Android Shell
        script: |
          set -e
          cd apps/mobile
          npx cap sync android
      - name: Write google-services.json (FCM push)
        script: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > apps/mobile/android/app/google-services.json
            echo "google-services.json written ($(wc -c < apps/mobile/android/app/google-services.json) bytes)"
          else
            echo "WARNING: GOOGLE_SERVICES_JSON not set — push notifications will NOT work in this build"
          fi
      - name: Set up release keystore
        script: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > /tmp/didi-upload.jks
            {
              echo "CM_KEYSTORE_PATH=/tmp/didi-upload.jks"
              echo "CM_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "CM_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "CM_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> $CM_ENV
            echo "Release keystore configured"
          else
            echo "WARNING: no keystore configured — output will be DEBUG-signed (sideload-only, not Play-uploadable)"
          fi
      - name: Build Android APK + AAB
        script: |
          set -e
          # Timestamp versionCode: monotonically newer on every build, well
          # under Play's 2100000000 cap.
          export ANDROID_VERSION_CODE=$(date +%s)
          export ANDROID_VERSION_NAME="1.0.$(date +%Y%m%d%H%M)"
          cd apps/mobile/android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
    artifacts:
      - apps/mobile/android/app/build/outputs/apk/release/*.apk
      - apps/mobile/android/app/build/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - ebenezer.barning@gmail.com
        notify:
          success: true
          failure: true
